<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伍次方的超级龙虾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%); display: flex; justify-content: center; align-items: center; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; overflow: hidden; position: relative; }
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 1; }
        .particle { position: absolute; border-radius: 50%; animation: floatUp 40s infinite linear; opacity: 0; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) translateX(0) scale(0.3); opacity: 0; }
            3% { opacity: 0.6; }
            50% { opacity: 0.8; }
            97% { opacity: 0.4; }
            100% { transform: translateY(-10vh) translateX(30px) scale(1); opacity: 0; }
        }
        /* 星尘背景层 - 三层深度 */
        .stardust { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; border-radius: 50%; }
        /* 远景星星 - 最暗最小 */
        .star-far { animation: twinkleFar 4s infinite ease-in-out; }
        @keyframes twinkleFar { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.3; } }
        /* 中景星星 */
        .star-mid { animation: twinkleMid 3s infinite ease-in-out; }
        @keyframes twinkleMid { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        /* 近景星星 - 最亮最大 */
        .star-near { animation: twinkleNear 3s infinite ease-in-out; }
        @keyframes twinkleNear { 0%, 100% { opacity: 0.35; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.2); } }
        /* 星云效果 */
        .nebula { position: fixed; border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; animation: nebulaPulse 8s infinite ease-in-out; }
        @keyframes nebulaPulse { 0%, 100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.25; transform: scale(1.1); } }
        .container { text-align: center; z-index: 10; position: relative; }
        .lobster-icon { font-size: 120px; margin-bottom: 30px; display: inline-block; animation: lobsterFloat 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate; filter: drop-shadow(0 0 30px rgba(255, 107, 53, 0.5)); cursor: pointer; transition: transform 0.3s ease; user-select: none; position: relative; }
        .lobster-icon:hover { transform: scale(1.1); }
        .lobster-icon:active { transform: scale(0.95); }
        @keyframes lobsterFloat { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
        @keyframes glow { from { filter: drop-shadow(0 0 20px rgba(255, 107, 53, 0.5)); } to { filter: drop-shadow(0 0 40px rgba(255, 107, 53, 0.8)); } }
        .mini-lobster { position: fixed; font-size: 40px; pointer-events: none; z-index: 100; filter: drop-shadow(0 0 10px rgba(255, 107, 53, 0.6)); }
        .title { font-size: 4rem; font-weight: 700; background: linear-gradient(90deg, #ff6b35, #f7931e, #ff6b35, #ff4757); background-size: 300% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientFlow 4s ease infinite; letter-spacing: 8px; margin-bottom: 20px; }
        @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .subtitle { font-size: 1.2rem; color: rgba(255, 255, 255, 0.6); letter-spacing: 12px; text-transform: uppercase; animation: fadeInUp 1.5s ease-out 0.5s both; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .line { width: 200px; height: 2px; background: linear-gradient(90deg, transparent, #ff6b35, transparent); margin: 40px auto; animation: lineExpand 2s ease-out 1s both; }
        @keyframes lineExpand { from { width: 0; opacity: 0; } to { width: 200px; opacity: 1; } }
        .halo { position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(255, 107, 53, 0.1) 0%, transparent 70%); animation: haloPulse 4s ease-in-out infinite; z-index: -1; }
        @keyframes haloPulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 0.8; } }
        .footer { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); color: rgba(255, 255, 255, 0.3); font-size: 0.85rem; letter-spacing: 2px; z-index: 10; }
        .click-hint { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); color: rgba(255, 255, 255, 0.4); font-size: 0.75rem; letter-spacing: 1px; opacity: 0; animation: hintFade 3s ease-in-out infinite; pointer-events: none; }
        @keyframes hintFade { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
        @media (max-width: 768px) { .title { font-size: 2.5rem; letter-spacing: 4px; } .lobster-icon { font-size: 80px; } .subtitle { font-size: 0.9rem; letter-spacing: 6px; } .mini-lobster { font-size: 30px; } }
    </style>
</head>
<body>
    <div class="stardust" id="stardust"></div>
    <div class="particles" id="particles"></div>
    <div class="container">
        <div class="halo"></div>
        <div class="lobster-icon" id="mainLobster">🦞<span class="click-hint">点击我</span></div>
        <h1 class="title">伍次方的超级龙虾</h1>
        <div class="line"></div>
        <p class="subtitle">AI-Powered Intelligence</p>
    </div>
    <div class="footer">Powered by 伍次方</div>
    <script>
        function createNebula() {
            const colors = [
                'rgba(100, 50, 150, 0.3)',   // 紫色星云
                'rgba(50, 100, 150, 0.25)',  // 蓝色星云
                'rgba(150, 80, 50, 0.2)',    // 橙色星云
                'rgba(50, 150, 100, 0.15)'   // 绿色星云
            ];
            for (let i = 0; i < 4; i++) {
                const nebula = document.createElement('div');
                nebula.className = 'nebula';
                nebula.style.left = (10 + Math.random() * 60) + '%';
                nebula.style.top = (10 + Math.random() * 60) + '%';
                nebula.style.width = (200 + Math.random() * 300) + 'px';
                nebula.style.height = (200 + Math.random() * 300) + 'px';
                nebula.style.background = colors[i];
                nebula.style.animationDelay = (Math.random() * 4) + 's';
                document.body.insertBefore(nebula, document.body.firstChild);
            }
        }

        function createStardust() {
            const container = document.getElementById('stardust');
            
            // 远景星星 - 最多、最小、最暗
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star star-far';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = '1px';
                star.style.height = '1px';
                star.style.background = '#fff';
                star.style.animationDelay = Math.random() * 4 + 's';
                container.appendChild(star);
            }
            
            // 中景星星
            for (let i = 0; i < 80; i++) {
                const star = document.createElement('div');
                star.className = 'star star-mid';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = 1 + Math.random() * 1.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.background = '#fff';
                star.style.boxShadow = '0 0 ' + (size * 2) + 'px rgba(255,255,255,0.5)';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
            
            // 近景星星 - 最少、最大、最亮
            for (let i = 0; i < 10; i++) {
                const star = document.createElement('div');
                star.className = 'star star-near';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = 2 + Math.random() * 2;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.background = '#fff';
                star.style.boxShadow = '0 0 ' + (size * 3) + 'px rgba(255,255,255,0.8), 0 0 ' + (size * 6) + 'px rgba(200,220,255,0.4)';
                star.style.animationDelay = Math.random() * 2.5 + 's';
                container.appendChild(star);
            }
        }

        function createParticles() {
            const container = document.getElementById('particles');
            const colors = [
                'rgba(255, 255, 255, 0.9)',
                'rgba(255, 220, 180, 0.8)',
                'rgba(180, 220, 255, 0.8)',
                'rgba(255, 200, 200, 0.7)'
            ];
            for (let i = 0; i < 60; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 40 + 's';
                particle.style.animationDuration = (30 + Math.random() * 25) + 's';
                const size = 3 + Math.random() * 6;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.background = 'radial-gradient(circle, ' + color + ' 0%, transparent 70%)';
                particle.style.boxShadow = '0 0 ' + (size * 2) + 'px ' + color;
                container.appendChild(particle);
            }
        }

        function createMiniLobsters(startX, startY) {
            const count = 3 + Math.floor(Math.random() * 3); // 随机3~5只
            for (let i = 0; i < count; i++) {
                const lobster = document.createElement('div');
                lobster.className = 'mini-lobster';
                lobster.textContent = '🦞';
                lobster.style.left = startX + 'px';
                lobster.style.top = startY + 'px';
                document.body.appendChild(lobster);

                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                let currentX = startX;
                let currentY = startY;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let rotation = 0;
                const rotationSpeed = (Math.random() - 0.5) * 15;
                const startTime = Date.now();
                const duration = 10000;

                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = elapsed / duration;
                    
                    // 动画结束后移除元素
                    if (progress >= 1) {
                        lobster.remove();
                        return;
                    }
                    
                    // 随机扰动，模拟游动
                    vx += (Math.random() - 0.5) * 0.3;
                    vy += (Math.random() - 0.5) * 0.3;
                    
                    // 限制速度
                    const maxSpeed = 4;
                    vx = Math.max(-maxSpeed, Math.min(maxSpeed, vx));
                    vy = Math.max(-maxSpeed, Math.min(maxSpeed, vy));
                    
                    currentX += vx;
                    currentY += vy;
                    
                    // 边界反弹
                    if (currentX < 0 || currentX > window.innerWidth) vx = -vx;
                    if (currentY < 0 || currentY > window.innerHeight) vy = -vy;
                    currentX = Math.max(0, Math.min(window.innerWidth, currentX));
                    currentY = Math.max(0, Math.min(window.innerHeight, currentY));
                    
                    rotation += rotationSpeed;
                    
                    // 渐隐效果：前70%时间完全不透明，后30%时间逐渐消失
                    const opacity = progress < 0.7 ? 1 : 1 - (progress - 0.7) / 0.3;
                    
                    lobster.style.left = currentX + 'px';
                    lobster.style.top = currentY + 'px';
                    lobster.style.transform = 'rotate(' + rotation + 'deg)';
                    lobster.style.opacity = opacity;
                    
                    requestAnimationFrame(animate);
                }
                
                // 延迟启动，产生爆炸效果
                setTimeout(() => animate(), i * 50);
            }
        }

        // 点击龙虾图标触发分身
        document.getElementById('mainLobster').addEventListener('click', function(e) {
            const rect = this.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            createMiniLobsters(centerX, centerY);
        });

        createNebula();
        createStardust();
        createParticles();
    </script>
</body>
</html>
